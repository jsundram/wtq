<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="color-scheme" content="light">
<title>WTQ</title>
<link rel="icon" href="favicon/favicon.ico" sizes="32x32">
<link rel="icon" href="favicon/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon/favicon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WTQ">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    color-scheme: light;
    --cream: #f5f0e8;
    --ink: #1a1208;
    --ink-mid: #4a3f2f;
    --ink-light: #8a7a62;
    --red: #8b1a1a;
    --red-light: rgba(139,26,26,.18);
    --gold: #c49a1e;
    --gold-light: rgba(196,154,30,.18);
    --rule: #c8bfaa;
    --surface: #ede8df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 16px 16px 0;
    border-bottom: 2px solid var(--ink);
    position: sticky; top: 0; z-index: 100;
    background: var(--cream);
  }
  .header-top {
    display: flex; align-items: baseline; gap: 10px;
  }
  header h1 {
    font-size: 1.05rem; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    flex: 1;
  }
  .header-counts {
    font-family: 'Courier Prime', monospace;
    font-size: .72rem; color: var(--ink-mid);
    white-space: nowrap;
  }
  .header-counts span { color: var(--red); font-weight: 700; }
  .collapse-btn {
    background: none; border: 1px solid var(--rule);
    border-radius: 3px; padding: 2px 7px;
    font-size: .7rem; color: var(--ink-light);
    cursor: pointer; font-family: 'Courier Prime', monospace;
  }
  .collapse-btn:active { background: var(--surface); }

  /* ── Circle of Fifths ── */
  .cof-wrap {
    display: flex; justify-content: center;
    padding: 14px 0 8px;
    border-bottom: 1px solid var(--rule);
  }
  .cof-svg { overflow: visible; }
  .cof-sector {
    cursor: pointer;
    transition: opacity .15s;
  }
  .cof-sector:active { opacity: .7; }
  .cof-label {
    font-family: 'EB Garamond', serif;
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
  }
  .cof-center-text {
    font-family: 'Courier Prime', monospace;
    dominant-baseline: middle;
    text-anchor: middle;
    pointer-events: none;
  }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 8px 16px;
    border-bottom: 1px solid var(--rule);
    font-size: .72rem;
    font-family: 'Courier Prime', monospace;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--ink-mid); }
  .legend-swatch {
    width: 12px; height: 12px; border-radius: 2px;
    border: 1px solid var(--ink-light);
    flex-shrink: 0;
  }

  /* ── Keys list ── */
  .keys-list { padding: 0 0 80px; }
  .key-section { border-bottom: 1px solid var(--rule); }
  .key-section.highlighted .key-header {
    background: rgba(139,26,26,.06);
  }

  .key-header {
    display: flex; align-items: center;
    padding: 10px 14px 10px 12px;
    cursor: pointer; gap: 10px;
  }
  .key-header:active { background: rgba(0,0,0,.04); }

  /* Progress ring around the key check */
  .key-ring {
    position: relative;
    width: 26px; height: 26px;
    flex-shrink: 0; cursor: pointer;
  }
  .key-ring svg { position: absolute; top: 0; left: 0; }
  .ring-bg { fill: none; stroke: var(--rule); stroke-width: 2; }
  .ring-progress { fill: none; stroke: var(--red); stroke-width: 2; stroke-linecap: round;
    transform-origin: 13px 13px; transform: rotate(-90deg);
    transition: stroke-dashoffset .3s ease; }
  .ring-check {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--ink-mid);
    position: absolute; top: 0; left: 0;
    transition: all .2s;
  }
  .key-ring.done .ring-bg { stroke: var(--red); }
  .key-ring.done .ring-check { background: var(--red); border-radius: 50%; color: white; }

  .key-name-block { flex: 1; }
  .key-name {
    font-size: 1.05rem; font-weight: 600; line-height: 1.1;
  }
  .key-enharmonic {
    font-size: .72rem; color: var(--ink-light); font-style: italic;
  }
  .key-uncertain-flag {
    font-size: .65rem; color: var(--gold); font-family: 'Courier Prime', monospace;
    letter-spacing: .06em;
  }

  .key-meta {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .key-progress-frac {
    font-family: 'Courier Prime', monospace;
    font-size: .68rem; color: var(--ink-light);
  }
  .key-progress-frac.partial { color: var(--red); }
  .key-chevron {
    font-size: .7rem; color: var(--ink-light);
    transition: transform .2s; flex-shrink: 0;
  }
  .key-section.open .key-chevron { transform: rotate(90deg); }

  /* ── Pieces list ── */
  .pieces-list {
    display: none;
    padding: 4px 14px 10px 48px;
    margin-left: 12px;
    border-left: 2px solid var(--rule);
  }
  .key-section.open .pieces-list { display: block; }
  .key-section.open { background: rgba(0,0,0,.015); }

  .piece-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    border-top: 1px solid var(--rule);
  }
  .piece-check {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 1.5px solid var(--ink-mid);
    border-radius: 3px;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s; font-size: 10px;
  }
  .piece-check.done { background: var(--red); border-color: var(--red); color: white; }

  .piece-info { flex: 1; min-width: 0; }
  .piece-composer { font-weight: 600; font-size: .9rem; line-height: 1.3; }
  .piece-title { font-style: italic; font-size: .82rem; color: var(--ink-mid); }
  .piece-notes { font-size: .72rem; color: var(--ink-light); margin-top: 2px; font-style: italic; }
  .piece-links { display: flex; gap: 6px; margin-top: 4px; }
  .piece-link {
    font-family: 'Courier Prime', monospace; font-size: .65rem;
    color: var(--red); text-decoration: none;
    border: 1px solid var(--red); padding: 1px 5px;
    border-radius: 2px; opacity: .8;
  }
  .status-badge {
    display: inline-block;
    font-family: 'Courier Prime', monospace; font-size: .6rem;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 1px 4px; border-radius: 2px; margin-top: 2px;
  }

  .piece-row.uncertain { background: rgba(196,154,30,.08); border-radius: 3px; padding: 8px 8px; margin: 0 -8px; }
  .piece-row.alternate { background: rgba(0,0,0,.03); border-radius: 3px; padding: 8px 8px; margin: 0 -8px; }
  .piece-row.rejected { opacity: .5; }
  .uncertain .status-badge { background: rgba(196,154,30,.18); color: #8a6800; }
  .alternate .status-badge { background: rgba(0,0,0,.08); color: var(--ink-light); }
  .rejected .status-badge { background: rgba(0,0,0,.06); color: var(--ink-light); }

  /* ── Footer bar ── */
  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--ink); color: var(--cream);
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Courier Prime', monospace; font-size: .75rem;
    letter-spacing: .05em;
  }
  .footer-bar .val { font-size: 1.05rem; font-weight: 700; color: #e8c07a; }
  .data-source {
    font-size: .6rem; letter-spacing: .06em; text-transform: uppercase;
    padding: 1px 5px; border-radius: 2px; opacity: .7;
  }
  .data-source.live   { color: #4a8b4a; }
  .data-source.cache  { color: #c49a1e; }
  .data-source.static { color: #8b1a1a; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Well-Tempered Quartet</h1>
    <div class="header-counts" id="headerCounts"><span>0</span> / 24 keys</div>
    <button class="collapse-btn" id="collapseAll" title="Toggle all"></button>
  </div>
  <div class="cof-wrap">
    <svg class="cof-svg" id="cofSvg" width="290" height="290" viewBox="-145 -145 290 290"></svg>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--red);border-color:var(--red)"></div>played</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(139,26,26,.3);border-color:var(--red)"></div>partial</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cream)"></div>candidate</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(196,154,30,.25);border-color:#c49a1e"></div>uncertain</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--surface)"></div>alternate</div>
</div>

<div class="keys-list" id="keysList"></div>

<div class="footer-bar">
  <span>KEYS</span><span class="val" id="fKeys">0/24</span>
  <span>PIECES</span><span class="val" id="fPieces">0/?</span>
  <span>PROGRESS</span><span class="val" id="fPct">0%</span>
  <span class="data-source" id="dataSource"></span>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
